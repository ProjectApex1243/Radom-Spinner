<meta charset="UTF-8">
<title>Apex build spin wheel</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #16181c;
    color: #eaeaea;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem 1rem;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0;
    color: #f5f5f5;
  }
  .sub {
    font-size: 13px;
    color: #9a9a9a;
    margin-top: -0.75rem;
  }
  .wheel-wrap {
    position: relative;
    width: 320px;
    height: 320px;
  }
  .pointer {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 24px solid #f5f5f5;
    z-index: 3;
  }
  #wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 3px solid #3a3d42;
    transition: transform 4.5s cubic-bezier(0.15, 0.65, 0.15, 1);
    box-shadow: 0 0 0 6px #1e2024;
  }
  .hub {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #16181c;
    border: 3px solid #3a3d42;
    z-index: 2;
  }
  button {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: #eaeaea;
    background: #24272c;
    border: 1px solid #3a3d42;
    border-radius: 8px;
    padding: 12px 24px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover:not(:disabled) { background: #2c2f35; }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: default; }
  #spinBtn { width: 180px; }
  #result {
    width: 100%;
    max-width: 440px;
    min-height: 96px;
    background: #1e2024;
    border: 1px solid #2c2f35;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    text-align: center;
  }
  #result .label {
    font-size: 13px;
    color: #9a9a9a;
    margin: 0 0 6px;
  }
  #result .value {
    font-size: 17px;
    font-weight: 600;
    margin: 0;
    color: #f5f5f5;
    word-break: break-all;
  }
  #copyRow {
    display: none;
    width: 100%;
    max-width: 440px;
    flex-direction: column;
    gap: 8px;
  }
  #cmdText {
    background: #1e2024;
    border: 1px solid #2c2f35;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: "SF Mono", Consolas, monospace;
    font-size: 13px;
    color: #c9c9c9;
    word-break: break-all;
  }
  #copyBtn.copied { background: #1f3a2a; border-color: #2f5c3f; color: #8fe0a8; }
</style>

const wheel = document.getElementById('wheel');
const n = items.length;
const wedge = 360 / n;
const colorA = '#24272c';
const colorB = '#1a1c20';
let stops = [];
for (let i = 0; i < n; i++) {
  const c = i % 2 === 0 ? colorA : colorB;
  const start = (i * wedge).toFixed(3);
  const end = ((i + 1) * wedge).toFixed(3);
  stops.push(c + ' ' + start + 'deg ' + end + 'deg');
}
wheel.style.background = 'conic-gradient(' + stops.join(',') + ')';

let rotation = 0;
let spinning = false;
let currentCmd = '';
const btn = document.getElementById('spinBtn');
const resultBox = document.getElementById('result');
const copyRow = document.getElementById('copyRow');
const cmdText = document.getElementById('cmdText');
const copyBtn = document.getElementById('copyBtn');

btn.addEventListener('click', function () {
  if (spinning) return;
  spinning = true;
  btn.disabled = true;
  copyRow.style.display = 'none';
  resultBox.innerHTML = '<p class="label">Spinning</p><p class="value">...</p>';
  const idx = Math.floor(Math.random() * n);
  const center = (idx + 0.5) * wedge;
  const extraSpins = 6 + Math.floor(Math.random() * 3);
  const currentMod = ((rotation % 360) + 360) % 360;
  const delta = ((360 - center) - currentMod + 360) % 360;
  rotation += extraSpins * 360 + delta;
  wheel.style.transform = 'rotate(' + rotation + 'deg)';
  setTimeout(function () {
    spinning = false;
    btn.disabled = false;
    const [date, time, id, beta, label] = items[idx];
    resultBox.innerHTML =
      '<p class="label">' + date + ' &middot; ' + time + ' UTC' + (beta ? ' &middot; beta' : '') + '</p>' +
      (label ? '<p class="value" style="margin-bottom:4px;">' + label + '</p>' : '') +
      '<p class="value"' + (label ? ' style="font-size:13px;font-weight:400;color:#9a9a9a;"' : '') + '>' + id + '</p>';
    currentCmd = 'download_depot 1533390 1533391 ' + id;
    cmdText.textContent = currentCmd;
    copyRow.style.display = 'flex';
    copyBtn.textContent = 'Copy command';
    copyBtn.classList.remove('copied');
  }, 4600);
});

copyBtn.addEventListener('click', function () {
  if (!currentCmd) return;
  function showCopied() {
    copyBtn.textContent = 'Copied';
    copyBtn.classList.add('copied');
    setTimeout(function () {
      copyBtn.textContent = 'Copy command';
      copyBtn.classList.remove('copied');
    }, 1500);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentCmd).then(showCopied).catch(function () {
      const ta = document.createElement('textarea');
      ta.value = currentCmd;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied();
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = currentCmd;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied();
  }
});
